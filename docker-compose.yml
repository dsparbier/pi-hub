services:
  pi-hub:
    build: .
    container_name: pi-hub
    restart: unless-stopped
    ports:
      - "3030:80"
    # For dev with hot-reload, override with the dev service below
    # and run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

